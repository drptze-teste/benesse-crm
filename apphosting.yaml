# Firebase App Hosting — configuração de runtime do backend Express (server.ts).
# O App Hosting roda `npm run build` e depois `npm start` (node dist/server.cjs).
# PORT é injetada automaticamente pelo App Hosting.

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512

env:
  # Modelo Gemini usado pelas rotas /api/ai/* (server-side).
  - variable: GEMINI_MODEL
    value: gemini-2.5-flash
    availability:
      - RUNTIME

  # Token de verificação do webhook do WhatsApp Business.
  - variable: WHATSAPP_VERIFY_TOKEN
    value: benesse_crm_token
    availability:
      - RUNTIME

  # Chave do Gemini — segredo no Secret Manager (setado via apphosting:secrets:set).
  # Usada pelas rotas /api/ai/* (escopo/e-mail da proposta, recompra, WhatsApp→lead).
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME

  # App Secret da Meta — valida a assinatura dos webhooks do WhatsApp.
  # Habilitar quando tiver o App da Meta criado:
  #   firebase apphosting:secrets:set WHATSAPP_APP_SECRET --project crm-benesse
  # Enquanto não setado, a validação de assinatura é pulada (modo de testes).
  # - variable: WHATSAPP_APP_SECRET
  #   secret: WHATSAPP_APP_SECRET
  #   availability:
  #     - RUNTIME
